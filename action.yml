name: 'IsReadyAI — readiness audit'
description: >-
  Audit whether a website is readable by AI crawlers (GPTBot, ClaudeBot,
  PerplexityBot) and AI search engines. Deep-crawls the site, fails the workflow
  when the score drops below your threshold, writes a full report to the job
  summary and (with an API key) uploads an authenticated CI report + repo badge.
author: 'Smart Squad S.r.l. (https://smartsquad.io)'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  url:
    description: >-
      URL to audit (validated against ^https?:// before use). When `command` is
      set this is the LOCAL URL the booted server listens on (e.g.
      http://localhost:3000); otherwise the public production or preview
      deployment. SECURITY: `url` is interpolated into shell commands. NEVER wire
      it from `pull_request_target`, issue/PR titles, comments, or any other
      attacker-controlled event data.
    required: true
  threshold:
    description: 'Minimum acceptable score (0-100); the step fails below it'
    required: false
    default: '70'
  command:
    description: >-
      Optional command that boots the branch environment (e.g.
      "npm run preview"). When set, the action starts it in the background,
      waits for `url` to respond, then scans that local URL. Leave empty to scan
      the public `url` directly. SECURITY: this string is executed verbatim with
      `bash -c`. Only ever set it to a literal command authored in your trusted
      workflow file. NEVER wire it from `pull_request_target` or any PR-head /
      fork-controlled data — that is remote code execution on your runner.
    required: false
    default: ''
  api-key:
    description: >-
      isready.ai API key (store it as a repo secret). When set, the report is
      uploaded to isready.ai and a branch-stable repo badge snippet is printed.
      Premium plans only.
    required: false
    default: ''
  api-url:
    description: 'isready.ai API origin (override for self-hosted deployments)'
    required: false
    default: 'https://isready.ai'
  report:
    description: >-
      Upload the scan report to isready.ai when an `api-key` is set (enables the
      branch-stable repo badge + shareable report). Set to "false" to keep the
      run local-only.
    required: false
    default: 'true'

outputs:
  score:
    description: 'Overall AI-readiness score (0-100)'
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: 'Grade: excellent | good | moderate | poor'
    value: ${{ steps.scan.outputs.grade }}
  badge:
    description: 'Markdown badge snippet for this branch (empty when no report was uploaded)'
    value: ${{ steps.upload.outputs.badge }}
  report-url:
    description: 'Shareable report URL on isready.ai (empty when no report was uploaded)'
    value: ${{ steps.upload.outputs.report-url }}

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: 1.3.14

    - name: Preflight — CI report upload
      # When an api-key is set and upload is not disabled, the report upload needs
      # `permissions: id-token: write` so GitHub mints the OIDC token that proves
      # repository ownership. Without it the upload could only be skipped — and
      # silently dropping the report at the END of the run is exactly how CI
      # results fail to appear on isready.ai unnoticed. Fail fast here, before the
      # scan, with the precise fix. No api-key (or report: false) is legitimate
      # local-gate mode: nothing to upload, so nothing to preflight.
      if: inputs.api-key != '' && inputs.report != 'false'
      shell: bash
      run: |
        set -euo pipefail
        # GitHub sets these two env vars for the job only when it is granted
        # `permissions: id-token: write`; ci-upload.ts reads the same vars to mint
        # the OIDC proof. Their absence means the upload can never succeed.
        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
          echo "::error title=isready.ai report upload needs id-token: write::An api-key is set, but this job cannot mint the GitHub OIDC token isready.ai uses to verify repository ownership.%0AAdd to your workflow:%0A%0Apermissions:%0A  id-token: write%0A  contents: read%0A%0Aor set 'report: false' to keep this run local-only (score gate only, no upload)."
          exit 1
        fi
        echo "isready: upload preflight ok — OIDC token request is available"

    - name: Install scanner
      shell: bash
      working-directory: ${{ github.action_path }}
      run: bun install --frozen-lockfile

    - name: Validate url
      shell: bash
      env:
        SCAN_URL: ${{ inputs.url }}
      run: |
        set -euo pipefail
        # `url` is interpolated into curl + the scanner CLI below. Enforce a strict
        # http(s) allowlist so shell metacharacters ($ ` " \ ; | & spaces, …) can
        # never reach those commands, even if a caller wires an untrusted value in.
        if ! printf '%s' "$SCAN_URL" \
          | grep -Eq '^https?://[A-Za-z0-9._-]+(:[0-9]+)?(/[A-Za-z0-9._~:/?#@!&()*+,;=%-]*)?$'; then
          echo "::error::invalid url input — must be a plain http(s):// URL with no shell metacharacters"
          exit 1
        fi

    - name: Boot branch environment
      if: inputs.command != ''
      shell: bash
      env:
        BOOT_COMMAND: ${{ inputs.command }}
        SCAN_URL: ${{ inputs.url }}
      run: |
        set -euo pipefail
        # Start the env detached so it survives this step; later steps scan it.
        nohup bash -c "$BOOT_COMMAND" > "$RUNNER_TEMP/isready-server.log" 2>&1 &
        echo "isready: booting branch env, waiting for $SCAN_URL"
        for i in $(seq 1 60); do
          if curl --silent --output /dev/null --max-time 5 "$SCAN_URL"; then
            echo "isready: $SCAN_URL is up after ${i}s"
            exit 0
          fi
          sleep 2
        done
        echo "::error::timed out waiting for $SCAN_URL to respond"
        echo "---- server log ----"
        cat "$RUNNER_TEMP/isready-server.log" || true
        exit 1

    - name: Scan
      id: scan
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        SCAN_URL: ${{ inputs.url }}
        THRESHOLD: ${{ inputs.threshold }}
        REPORT_PATH: ${{ runner.temp }}/isready-report.json
      run: |
        set -euo pipefail
        # Deep crawl (uncapped); JSON for parsing, markdown for the job summary.
        bun apps/cli/src/index.ts "$SCAN_URL" --deep --json > "$REPORT_PATH" || true
        if ! grep -q '"overall"' "$REPORT_PATH"; then
          echo "::error::isreadyai scan failed — site unreachable?"
          exit 1
        fi
        SCORE=$(bun -e "const r=await Bun.file(process.env.REPORT_PATH).json();console.log(r.overall)")
        GRADE=$(bun -e "const r=await Bun.file(process.env.REPORT_PATH).json();console.log(r.grade)")
        echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        echo "grade=$GRADE" >> "$GITHUB_OUTPUT"

        bun apps/cli/src/from-json.ts "$REPORT_PATH" >> "$GITHUB_STEP_SUMMARY"

        echo "isready: $SCORE/100 ($GRADE) — threshold $THRESHOLD"
        if [ "$SCORE" -lt "$THRESHOLD" ]; then
          echo "::error::AI-readiness score $SCORE is below the threshold of $THRESHOLD"
          exit 1
        fi

    - name: Upload CI report
      id: upload
      if: always() && inputs.api-key != '' && inputs.report != 'false' && steps.scan.outputs.score != ''
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        ISREADYAI_API_KEY: ${{ inputs.api-key }}
        ISREADYAI_API_URL: ${{ inputs.api-url }}
        REPORT_PATH: ${{ runner.temp }}/isready-report.json
        GH_REPOSITORY_ID: ${{ github.repository_id }}
        GH_REPOSITORY: ${{ github.repository }}
        GH_REF_NAME: ${{ github.ref_name }}
        GH_SHA: ${{ github.sha }}
      run: bun apps/cli/src/ci-upload.ts
