name: Sync dedicated action repos

# On a monorepo version tag (X.Y.Z), mirror the generated action trees
# (dist-actions/<action>/, built by scripts/build-action-repos.ts) onto the main
# branch of isreadyai/audit-action + fix-action AND cut a patch release on each —
# which moves that repo's v1 / v1.x tags via its own release.yml. On
# workflow_dispatch it mirrors main only (no release).
#
# Requires a fine-grained PAT scoped to both dedicated repos with Contents: write
# and Workflows: write (the synced tree includes .github/workflows/*, which the
# default GITHUB_TOKEN can never push), stored as secret ISREADYAI_SYNC_TOKEN.

on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - action: audit-action
            repo: isreadyai/audit-action
          - action: fix-action
            repo: isreadyai/fix-action
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build ${{ matrix.action }}
        env:
          ACTION: ${{ matrix.action }}
        run: bun run scripts/build-action-repos.ts --only "$ACTION"

      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.ISREADYAI_SYNC_TOKEN }}
          path: target

      - name: Mirror generated tree onto main
        id: mirror
        env:
          ACTION: ${{ matrix.action }}
          TARGET: ${{ matrix.repo }}
        run: |
          set -euo pipefail
          # CHANGELOG.md is owned by the target's own release workflow; never overwrite it.
          rsync -a --delete --exclude='.git/' --exclude='CHANGELOG.md' \
            "dist-actions/$ACTION/" target/
          cd target
          git config user.name "isready-bot"
          git config user.email "bot@isready.ai"
          git add -A
          if git diff --cached --quiet; then
            echo "$TARGET already up to date — nothing to push"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "sync: update from isreadyai/isreadyai@${GITHUB_SHA:0:7}"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Release ${{ matrix.repo }}
        # Only on a monorepo version tag, and only when the mirror pushed a change.
        # Creating the release fires the dedicated repo's own release.yml, which
        # moves its v1 / v1.x tags — so @v1 consumers pick up the update.
        if: github.event_name == 'push' && steps.mirror.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.ISREADYAI_SYNC_TOKEN }}
          REPO: ${{ matrix.repo }}
          MONO_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Bump the patch of the dedicated repo's own latest release (its v1.x line
          # is independent of the monorepo's version).
          LATEST=$(gh release view --repo "$REPO" --json tagName --jq .tagName 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            IFS=. read -r MA MI PA <<< "${LATEST#v}"
            NEXT="v${MA}.${MI}.$((PA + 1))"
          fi
          gh release create "$NEXT" --repo "$REPO" --target main --title "$NEXT" \
            --notes "Synced from isreadyai/isreadyai@${MONO_TAG}." --latest
          echo "released $REPO $NEXT"
