name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref so stuck/old jobs don't hold runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Pin to the version declared by packageManager so commits run against a
          # stable toolchain instead of a moving `latest`.
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        # Fail on any new moderate+ advisory; the one accepted advisory (uuid via
        # the dev-only `exits` tool, not reachable in our usage) is ignored by id.
        run: bun audit --audit-level=moderate --ignore=GHSA-w5hq-g745-h8pq

      - name: Forbidden / secret-bearing files
        # Block committing real env files (except *.env.example), private keys,
        # certs, and credential files. Scans the tracked tree.
        run: |
          matches=$(git ls-files | grep -E '(^|/)\.env(\.|$)|\.(pem|key|p12|pfx|keystore)$|(^|/)\.(npmrc|netrc|git-credentials)$|(^|/)id_(rsa|dsa|ecdsa|ed25519)$' | grep -vE '\.env\.example$' || true)
          if [ -n "$matches" ]; then
            echo "::error::Forbidden / secret-bearing files are tracked:"
            echo "$matches"
            exit 1
          fi
          echo "No forbidden files tracked."

      - name: Lint
        run: bunx oxlint

      - name: Format check
        run: bunx oxfmt --check .

      - name: Version sync check
        run: bun run version:check

      - name: Type-check
        run: bunx turbo run type-check

      # Supabase pgTAP runs in the dedicated `supabase` job below (it needs a live
      # local database), so it is excluded from this fast unit-test pass.
      - name: Test
        run: bunx turbo run test --filter='!@isreadyai/supabase'

      - name: Build web
        run: bunx turbo run build
        env:
          NODE_ENV: production

  # Boots the local Supabase stack — which applies EVERY migration in
  # packages/supabase/migrations, catching migration regressions — and then runs
  # the pgTAP suite (RLS policies, grants, triggers) against it. Kept as its own
  # job because `supabase start` needs Docker and is heavier than the unit pass.
  supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # config.toml enables the OAuth providers for local development. CI does not
    # exercise their external redirects, but explicit inert values keep config
    # interpolation deterministic and avoid misleading "variable is unset" logs.
    env:
      SUPABASE_AUTH_SITE_URL: http://localhost:3300
      SUPABASE_AUTH_GOOGLE_CLIENT_ID: ci-unused
      SUPABASE_AUTH_GOOGLE_SECRET: ci-unused
      SUPABASE_AUTH_GITHUB_CLIENT_ID: ci-unused
      SUPABASE_AUTH_GITHUB_SECRET: ci-unused
      SUPABASE_AUTH_X_CLIENT_ID: ci-unused
      SUPABASE_AUTH_X_SECRET: ci-unused
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1
        with:
          # Keep CI aligned with packages/supabase's locked CLI behavior.
          version: 2.108.0

      # `supabase start` applies all migrations on boot; a broken migration fails
      # the job here, before any pgTAP test runs.
      - name: Start Supabase (applies all migrations)
        run: bun run start
        working-directory: packages/supabase

      # Runs packages/supabase/tests/*.sql via pgTAP. Guarded so the job still
      # validates migrations while the pgTAP suite is being authored; once any
      # tests/*.sql exists they run and must pass.
      - name: Run pgTAP tests
        working-directory: packages/supabase
        run: |
          if ls tests/*.sql >/dev/null 2>&1; then
            bun run test
          else
            echo "::warning::No pgTAP tests in packages/supabase/tests yet — migrations validated by 'supabase start', but RLS/policies are unguarded. Add tests/*.sql."
          fi

      - name: Stop Supabase
        if: always()
        run: bun run stop
        working-directory: packages/supabase
