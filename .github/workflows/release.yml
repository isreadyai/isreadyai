name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      # OIDC trusted publishing needs npm >= 11.5.1; pin within npm 11 so the
      # OIDC handshake is always available without jumping to a new major.
      - name: Use an OIDC-capable npm
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync workspace versions from the root
        run: bun run version:sync

      - name: Verify the release tag matches the root version
        run: |
          root="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          test "$root" = "$tag" || { echo "release tag '$tag' != root version '$root'"; exit 1; }

      - name: Verify
        run: |
          bunx oxlint
          bunx oxfmt --check .
          bunx turbo run type-check test --filter='!@isreadyai/supabase'

      - name: Build the CLI bundle
        run: bunx turbo run build --filter=isreadyai

      # Trusted publishing (OIDC): no NPM_TOKEN secret, provenance is automatic.
      # Configure the trusted publisher for `isreadyai` on npmjs.com first.
      - name: Publish isreadyai to npm
        run: npm publish --access public
        working-directory: apps/cli
