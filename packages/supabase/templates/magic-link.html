<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="supported-color-schemes" content="dark" />
    <style>
      @media only screen and (max-width: 600px) {
        .ir-card {
          width: 100% !important;
        }
        .ir-pad {
          padding: 28px 20px !important;
        }
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; background-color: #161613">
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="background-color: #161613"
    >
      <tr>
        <td align="center" style="padding: 32px 16px">
          <table
            role="presentation"
            class="ir-card"
            width="560"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="
              width: 560px;
              max-width: 560px;
              background-color: #1c1c19;
              border: 1px solid #2e2e29;
              border-radius: 16px;
            "
          >
            <tr>
              <td
                class="ir-pad"
                style="
                  padding: 36px;
                  font-family:
                    -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
                    sans-serif;
                  color: #ececea;
                "
              >
                <p style="margin: 0 0 28px; font-size: 15px; font-weight: 600; color: #b8f53d">
                  &#9670; isready.ai
                </p>
                <h1 style="margin: 0 0 12px; font-size: 20px; font-weight: 700; color: #ececea">
                  Sign in to isready.ai
                </h1>
                <p style="margin: 0 0 24px; font-size: 14px; line-height: 1.6; color: #9a9a92">
                  Click the button below to sign in. This link is single-use and expires shortly.
                </p>
                <p style="margin: 0 0 24px">
                  <a
                    href="{{ .ConfirmationURL }}"
                    style="
                      display: inline-block;
                      background-color: #b8f53d;
                      color: #161613;
                      font-weight: 600;
                      text-decoration: none;
                      padding: 13px 22px;
                      border-radius: 10px;
                      font-size: 14px;
                    "
                    >Sign in</a
                  >
                </p>
                <p style="margin: 0; font-size: 12px; line-height: 1.6; color: #6b6b64">
                  If you didn't try to sign in, you can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
          <p
            style="
              margin: 18px 0 0;
              font-family:
                -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
              font-size: 12px;
              color: #6b6b64;
            "
          >
            isready.ai — is your website ready for AI?
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
